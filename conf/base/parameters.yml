# =============================================================================
# PARAMETERS — Caso 3: Recursos Humanos
# SCY1101 Programación para la Ciencia de Datos
# Centraliza todos los hiperparámetros del proyecto para facilitar
# la reproducibilidad y el ajuste sin tocar el código fuente.
# =============================================================================

# -----------------------------------------------------------------------------
# Pipeline: data_cleaning
# -----------------------------------------------------------------------------
cleaning:

  # Columnas numéricas donde imputar nulos con la MEDIANA
  impute_median:
    empleados:   ["salario", "id_empleado"]
    ausencias:   ["dias", "id_empleado"]
    capacitaciones: ["horas", "nota_final"]
    evaluaciones: ["puntaje_desempeno", "competencias_tecnicas", "competencias_blandas"]

  # Columnas categóricas donde imputar nulos con la MODA
  impute_mode:
    empleados:   ["departamento", "cargo", "tipo_contrato", "jornada"]
    ausencias:   ["tipo_ausencia", "justificada"]
    capacitaciones: ["nombre_curso", "estado"]
    evaluaciones: ["periodo"]

  # Columnas de fecha a parsear en cada dataset
  date_columns:
    empleados:      ["fecha_ingreso"]
    ausencias:      ["fecha_inicio", "fecha_fin"]
    capacitaciones: ["fecha_inicio", "fecha_fin"]
    evaluaciones:   []

  # Método para tratamiento de outliers: "iqr" o "zscore"
  outlier_method: "iqr"

  # Factor IQR (1.5 = estándar, 3.0 = solo outliers extremos)
  iqr_factor: 1.5

  # Columnas numéricas a revisar por outliers
  outlier_columns:
    empleados:      ["salario"]
    ausencias:      ["dias"]
    capacitaciones: ["horas", "nota_final"]
    evaluaciones:   ["puntaje_desempeno", "competencias_tecnicas", "competencias_blandas"]

  # Umbral de puntaje máximo válido en evaluaciones (escala 1-7)
  puntaje_max_valido: 7.0
  puntaje_min_valido: 1.0

# -----------------------------------------------------------------------------
# Pipeline: data_transform
# -----------------------------------------------------------------------------
transform:

  # Columnas a normalizar con MinMaxScaler (rango 0-1)
  normalize_minmax:
    - "salario"
    - "dias_ausencia_total"
    - "horas_capacitacion_total"
    - "puntaje_desempeno_promedio"

  # Columnas a estandarizar con StandardScaler (media 0, std 1)
  standardize_zscore:
    - "competencias_tecnicas_promedio"
    - "competencias_blandas_promedio"

  # Columnas categóricas a codificar con Label Encoding
  label_encode:
    - "tipo_contrato"
    - "jornada"

  # Columnas categóricas a codificar con One-Hot Encoding
  onehot_encode:
    - "departamento"
    - "tipo_ausencia_mas_frecuente"

  # Umbral mínimo de capacitaciones completadas para flag binario
  min_capacitaciones_completadas: 1

  # Columnas clave para el join maestro
  join_key: "id_empleado"

# -----------------------------------------------------------------------------
# Pipeline: data_validation
# -----------------------------------------------------------------------------
validation:

  # Porcentaje máximo de nulos permitido en el dataset final (0.0 = sin nulos)
  max_null_pct: 0.0

  # Rango válido de salarios (en CLP)
  salario_min: 200000
  salario_max: 10000000

  # Rango válido de días de ausencia
  dias_min: 1
  dias_max: 31

  # Rango válido de notas de capacitación
  nota_min: 1.0
  nota_max: 7.0

  # Rango válido de puntajes de evaluación
  puntaje_min: 1.0
  puntaje_max: 7.0

  # Columnas obligatorias en el dataset final integrado
  required_columns:
    - "id_empleado"
    - "nombre"
    - "departamento"
    - "cargo"
    - "salario"
    - "fecha_ingreso"

# -----------------------------------------------------------------------------
# EV2 — Machine Learning
# -----------------------------------------------------------------------------

preprocessing:
  target_clf: "segmento_desempeno"
  target_reg: "score_desempeno"
  drop_columns:
    - "segmento_desempeno"
    - "score_desempeno"
    - "riesgo_ausentismo"
  test_size: 0.2
  random_state: 42
  stratify_clf: true

classification:
  random_state: 42

  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    class_weight: "balanced"
    random_state: 42

  logistic_regression:
    max_iter: 1000
    C: 1.0
    solver: "lbfgs"
    multi_class: "auto"
    class_weight: "balanced"
    random_state: 42

  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 4
    subsample: 0.8
    random_state: 42

  cross_validation:
    cv: 5
    scoring: "f1_weighted"

regression:
  random_state: 42

  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42

  ridge:
    alpha: 1.0
    max_iter: 1000

  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 4
    subsample: 0.8
    random_state: 42

  cross_validation:
    cv: 5
    scoring: "neg_root_mean_squared_error"

hyperparameter_tuning:
  random_state: 42
  cv: 5
  scoring_clf: "f1_weighted"
  scoring_reg: "neg_root_mean_squared_error"
  n_jobs: -1
  verbose: 1

  grid_search_rf_clf:
    n_estimators: [50, 100, 200]
    max_depth: [5, 10, 15, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    class_weight: ["balanced"]

  random_search_gbm_clf:
    n_iter: 30
    param_distributions:
      n_estimators: [50, 100, 150, 200, 300]
      learning_rate: [0.01, 0.05, 0.1, 0.2]
      max_depth: [3, 4, 5, 6, 8]
      subsample: [0.6, 0.7, 0.8, 0.9, 1.0]
      min_samples_split: [2, 5, 10]

unsupervised:
  random_state: 42

  kmeans:
    n_clusters: 3
    n_init: 10
    max_iter: 300
    k_range: [2, 3, 4, 5, 6, 7, 8]

  pca:
    n_components: 2
    random_state: 42